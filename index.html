<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Landfill Liner & Groundwater Simulation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --danger: #ef4444;
            --safe: #10b981;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            transition: background 1s ease-in-out;
            /* Default Background (No Rain) */
            background: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
            overflow-x: hidden;
        }

        body.weather-light { background: radial-gradient(circle at top, #334155 0%, #0f172a 100%); }
        body.weather-storm { background: radial-gradient(circle at top left, #1e1b4b 0%, #020617 80%); }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 1300px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
        }

        header h1 { margin: 0; font-weight: 800; font-size: 2.2rem; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        header p { margin: 8px 0 0 0; color: var(--text-muted); font-size: 1.1rem; font-weight: 300;}

        .main-content { display: flex; gap: 2rem; align-items: stretch; }

        .canvas-wrapper {
            flex: 2;
            position: relative;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 650px; }

        .controls-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.2rem;
            border-radius: 12px;
        }

        .control-group h3 { margin: 0 0 1rem 0; font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}

        .btn-grid { display: grid; gap: 10px; }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #020617;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-drainage { text-align: center; font-size: 1.1rem; }
        .btn-drainage.active { background: var(--safe); border-color: var(--safe); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .btn-drainage:not(.active) { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); color: white;}

        .status-board {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 4px solid var(--safe);
            transition: border-color 0.3s;
        }

        .status-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .status-label { color: var(--text-muted); font-size: 0.95rem; }
        .status-val { font-weight: 800; font-size: 1.05rem; }

        .text-safe { color: var(--safe); }
        .text-warning { color: var(--warning); }
        .text-danger { color: var(--danger); }

        @media (max-width: 1024px) {
            .main-content { flex-direction: column; }
            canvas { height: 500px; }
        }
    </style>
</head>
<body>

    <main class="glass-panel">
        <header>
            <h1>Sustainable Landfill Liner Dynamics</h1>
            <p>Evaluating Natural Decomposition, Heavy Metal Transport, and Hydraulic Head Failure</p>
        </header>

        <div class="main-content">
            <div class="canvas-wrapper">
                <canvas id="simCanvas"></canvas>
            </div>

            <div class="controls-panel">
                
                <div class="control-group">
                    <h3>1. Precipitation State</h3>
                    <div class="btn-grid" id="weather-controls">
                        <button class="active" data-val="none">None (Natural Moisture Only)</button>
                        <button data-val="light">Light Rain</button>
                        <button data-val="storm">Heavy Storm</button>
                    </div>
                </div>

                <div class="control-group">
                    <h3>2. Liner Quality</h3>
                    <div class="btn-grid" id="liner-controls">
                        <button data-val="high_perm">High Permeability (Natural Soil)</button>
                        <button class="active" data-val="optimal">Optimal Impermeability (Compacted)</button>
                        <button data-val="brittle">Over-Compacted (Brittle/Cracks Easily)</button>
                    </div>
                </div>

                <div class="control-group">
                    <h3>3. Leachate Collection System</h3>
                    <button id="btn-drainage" class="btn-drainage active">Drainage: ACTIVE</button>
                </div>

                <div class="status-board" id="status-board">
                    <div class="status-row">
                        <span class="status-label">Hydraulic Head Pressure:</span>
                        <span class="status-val text-safe" id="val-pressure">Low</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">System Structural Integrity:</span>
                        <span class="status-val text-safe" id="val-integrity">Stable</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Groundwater Status:</span>
                        <span class="status-val text-safe" id="val-groundwater">Safe</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Setup & Sizing ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Layers (Y-coordinates as percentages of height) ---
        function getLayers() {
            return {
                sky: canvas.height * 0.15,
                waste: canvas.height * 0.65, // Massive waste layer
                liner: canvas.height * 0.75,
                water: canvas.height * 1.00
            };
        }

        // --- State Management ---
        const state = {
            weather: 'none', // 'none', 'light', 'storm'
            liner: 'optimal', // 'high_perm', 'optimal', 'brittle'
            drainage: true,
            isRuptured: false,
            pressurePool: 0,
            groundwaterContaminated: false
        };

        const limits = {
            optimal_max_head: 400,
            brittle_max_head: 150 // Fails much faster
        };

        let particles = [];

        // --- UI Binding ---
        document.querySelectorAll('#weather-controls button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#weather-controls button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.weather = e.target.getAttribute('data-val');
                document.body.className = `weather-${state.weather}`;
            });
        });

        document.querySelectorAll('#liner-controls button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#liner-controls button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.liner = e.target.getAttribute('data-val');
                // Reset rupture if liner is replaced
                state.isRuptured = false;
                state.pressurePool = 0;
                updateStatus();
            });
        });

        const btnDrainage = document.getElementById('btn-drainage');
        btnDrainage.addEventListener('click', () => {
            state.drainage = !state.drainage;
            btnDrainage.classList.toggle('active', state.drainage);
            btnDrainage.textContent = state.drainage ? "Drainage: ACTIVE" : "Drainage: DISABLED (Pooling)";
        });

        // --- UI Status Updater ---
        function updateStatus() {
            const elPressure = document.getElementById('val-pressure');
            const elIntegrity = document.getElementById('val-integrity');
            const elGroundwater = document.getElementById('val-groundwater');
            const board = document.getElementById('status-board');

            // 1. Pressure
            if (state.drainage || state.liner === 'high_perm' || state.isRuptured) {
                elPressure.textContent = "Minimal / Draining";
                elPressure.className = "status-val text-safe";
            } else {
                let max = state.liner === 'optimal' ? limits.optimal_max_head : limits.brittle_max_head;
                let pct = state.pressurePool / max;
                if (pct > 0.8) { elPressure.textContent = "CRITICAL HIGH"; elPressure.className = "status-val text-danger"; }
                else if (pct > 0.4) { elPressure.textContent = "Building (Warning)"; elPressure.className = "status-val text-warning"; }
                else { elPressure.textContent = "Increasing"; elPressure.className = "status-val text-warning"; }
            }

            // 2. Integrity
            if (state.isRuptured) {
                elIntegrity.textContent = "CATASTROPHIC FAILURE";
                elIntegrity.className = "status-val text-danger";
            } else if (state.liner === 'high_perm') {
                elIntegrity.textContent = "Permeable (Ineffective)";
                elIntegrity.className = "status-val text-danger";
            } else if (state.liner === 'brittle') {
                elIntegrity.textContent = "Brittle (High Risk)";
                elIntegrity.className = "status-val text-warning";
            } else {
                elIntegrity.textContent = "Stable (Optimal)";
                elIntegrity.className = "status-val text-safe";
            }

            // 3. Groundwater & Border
            if (state.groundwaterContaminated) {
                elGroundwater.textContent = "CONTAMINATED (Toxic)";
                elGroundwater.className = "status-val text-danger";
                board.style.borderLeftColor = "var(--danger)";
            } else {
                elGroundwater.textContent = "Protected / Safe";
                elGroundwater.className = "status-val text-safe";
                board.style.borderLeftColor = "var(--safe)";
            }
        }

        // --- Custom Drawing Functions ---
        function drawWaterDrop(ctx, x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - size); // Top tip
            ctx.bezierCurveTo(x + size, y - size/2, x + size, y + size, x, y + size);
            ctx.bezierCurveTo(x - size, y + size, x - size, y - size/2, x, y - size);
            ctx.fill();
        }

        function drawGlowingOrb(ctx, x, y, size, innerColor, outerColor) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = outerColor;
            ctx.fillStyle = innerColor;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // Reset
        }

        // --- Particle Physics Engine ---
        class Particle {
            constructor(isHeavyMetal = false, spawnY = 0) {
                this.x = Math.random() * canvas.width;
                this.y = spawnY;
                this.vx = 0;
                this.vy = isHeavyMetal ? 0.5 : (3 + Math.random() * 2); // Metals move slower
                this.isHeavyMetal = isHeavyMetal;
                this.size = isHeavyMetal ? 3 : 4;
                this.inPool = false;
                this.isDraining = false;
            }

            update(layers) {
                this.x += this.vx;
                this.y += this.vy;

                // Zone 1: Sky
                if (this.y < layers.sky) {
                    // Rain falls fast
                }
                // Zone 2: Waste Layer
                else if (this.y >= layers.sky && this.y < layers.waste) {
                    if (!this.isHeavyMetal) {
                        this.vy = 1.5; // Slow down in waste
                        this.vx = (Math.random() - 0.5) * 0.8; // Meander
                    } else {
                        // Heavy metals slowly seep down
                        this.vy = 0.8; 
                        this.vx = (Math.random() - 0.5) * 0.3;
                    }
                }
                // Zone 3: Liner Interaction
                else if (this.y >= layers.waste && this.y < layers.liner) {
                    this.vx = 0;

                    if (state.isRuptured || state.liner === 'high_perm') {
                        // Fails: Drops straight through
                        this.vy = this.isHeavyMetal ? 2 : 4; 
                        if (this.inPool) { state.pressurePool--; this.inPool = false; }
                    } else {
                        // Stopped by liner
                        this.vy = 0;
                        
                        if (state.drainage) {
                            // Safely route to sides
                            this.vx = (this.x < canvas.width / 2) ? -2 : 2;
                            this.y = layers.waste + 2; // Slide exactly on top
                            this.isDraining = true;
                            if (this.inPool) { state.pressurePool--; this.inPool = false; }
                        } else {
                            // Pool up & Build Pressure
                            if (!this.inPool) {
                                state.pressurePool++;
                                this.inPool = true;
                                updateStatus();
                            }
                            // Simulate physical stacking
                            let heightOffset = (state.pressurePool / 50);
                            this.y = layers.waste - (Math.random() * heightOffset);
                            this.vx = (Math.random() - 0.5) * 0.5; // Jiggle
                        }
                    }
                }
                // Zone 4: Groundwater
                else if (this.y >= layers.liner) {
                    this.vy = 1;
                    this.vx = 0;
                    if (this.inPool) { state.pressurePool--; this.inPool = false; }
                    
                    if (!state.groundwaterContaminated) {
                        state.groundwaterContaminated = true;
                        updateStatus();
                    }
                }

                // Cleanup bounds & drainage pipes
                if (this.y > canvas.height) this.dead = true;
                if (this.isDraining && (this.x < 20 || this.x > canvas.width - 20)) {
                    this.dead = true; // Safely removed
                }
            }

            draw() {
                if (this.isHeavyMetal) {
                    // Toxic metal visual
                    drawGlowingOrb(ctx, this.x, this.y, this.size, '#a3e635', '#4d7c0f'); // Greenish toxic glow
                } else {
                    // Liquid visual based on zone
                    let color = '#38bdf8'; // Clean rain
                    if (this.y > getLayers().sky) color = '#78350f'; // Toxic brown leachate
                    if (this.isDraining) color = '#ca8a04'; // Drainage color
                    if (this.y > getLayers().liner && state.liner !== 'optimal') color = '#991b1b'; // Red contamination in water
                    
                    drawWaterDrop(ctx, this.x, this.y, this.size, color);
                }
            }
        }

        // --- Rendering Logic ---
        function drawEnvironment(layers) {
            // Waste Layer
            ctx.fillStyle = '#292524'; // Very dark grey/brown
            ctx.fillRect(0, layers.sky, canvas.width, layers.waste - layers.sky);
            
            // Waste Texture (subtle debris)
            ctx.fillStyle = '#44403c';
            for(let i=0; i<100; i++) {
                // Using pseudo-random based on width to keep it static-looking
                let rx = (i * 73) % canvas.width; 
                let ry = layers.sky + ((i * 31) % (layers.waste - layers.sky));
                ctx.fillRect(rx, ry, 12, 12);
            }

            // Liner Layer
            let linerColor = '#78716c'; // Optimal
            if (state.liner === 'high_perm') linerColor = '#a8a29e'; // Sandy/Light
            if (state.liner === 'brittle') linerColor = '#57534e'; // Very dark/hard
            
            ctx.fillStyle = linerColor;
            ctx.fillRect(0, layers.waste, canvas.width, layers.liner - layers.waste);

            // Drainage Pipes (If Active)
            if (state.drainage && state.liner !== 'high_perm') {
                ctx.fillStyle = '#94a3b8'; // Pipe outer
                ctx.beginPath();
                ctx.arc(10, layers.waste + 10, 25, 0, Math.PI * 2);
                ctx.arc(canvas.width - 10, layers.waste + 10, 25, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000'; // Pipe hollow inside
                ctx.beginPath();
                ctx.arc(10, layers.waste + 10, 15, 0, Math.PI * 2);
                ctx.arc(canvas.width - 10, layers.waste + 10, 15, 0, Math.PI * 2);
                ctx.fill();
            }

            // Structural Rupture Visual
            if (state.isRuptured) {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 5;
                ctx.beginPath();
                let cx = canvas.width / 2;
                ctx.moveTo(cx - 20, layers.waste);
                ctx.lineTo(cx + 10, layers.waste + 20);
                ctx.lineTo(cx - 5, layers.waste + 40);
                ctx.lineTo(cx + 30, layers.liner);
                ctx.stroke();

                // Toxic glow around crack
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ef4444';
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Groundwater Aquifer
            let waterColor = state.groundwaterContaminated ? '#450a0a' : '#0891b2'; // Turns red/black if contaminated
            ctx.fillStyle = waterColor;
            ctx.fillRect(0, layers.liner, canvas.width, canvas.height - layers.liner);

            // Draw text labels
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = 'bold 16px Inter';
            ctx.fillText("Precipitation Zone", 20, 30);
            ctx.fillText("Municipal Solid Waste (Leachate Generation)", 20, layers.sky + 30);
            ctx.fillText("Engineered Liner", 20, layers.waste + 25);
            ctx.fillText("Groundwater Aquifer", 20, layers.liner + 30);
        }

        // --- Main Animation Loop ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const layers = getLayers();
            
            drawEnvironment(layers);

            // 1. Spawning Logic
            // Weather Rain
            if (state.weather === 'light' && Math.random() < 0.2) particles.push(new Particle(false, 0));
            if (state.weather === 'storm' && Math.random() < 0.8) {
                particles.push(new Particle(false, 0));
                particles.push(new Particle(false, 0));
                particles.push(new Particle(false, 0)); // Heavy downpour
            }

            // Natural Decomposition (Spawn deep inside waste layer)
            if (Math.random() < 0.05) { // Slow, constant generation
                let spawnY = layers.sky + Math.random() * (layers.waste - layers.sky - 20);
                // 1 in 10 natural particles is a heavy metal
                let isMetal = Math.random() < 0.1;
                particles.push(new Particle(isMetal, spawnY));
            }

            // 2. Physics Failure Check (Hydraulic Head)
            if (!state.isRuptured && !state.drainage && state.liner !== 'high_perm') {
                let threshold = state.liner === 'optimal' ? limits.optimal_max_head : limits.brittle_max_head;
                if (state.pressurePool > threshold) {
                    state.isRuptured = true;
                    updateStatus();
                }
            }

            // 3. Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(layers);
                p.draw();
                if (p.dead) particles.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }

        // Start Simulator
        updateStatus();
        animate();

    </script>
</body>
</html>
